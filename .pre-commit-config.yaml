exclude: "^dbt_packages$"

repos:
  - repo: https://github.com/psf/black
    rev: 22.12.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v3.0.0"
    hooks:
      - id: prettier

  - repo: https://github.com/crate-ci/typos
    rev: v1.16.6
    hooks:
      - id: typos

  - repo: https://github.com/tconbeer/sqlfmt
    rev: v0.29.0
    hooks:
      - id: sqlfmt
        additional_dependencies: ["shandy-sqlfmt[jinjafmt]"]
        # Excluded files — sqlfmt damages these in ways that break runtime behavior:
        #   - macros/: dbt-fusion compatibility — sqlfmt's Jinja reformatting
        #     (whitespace changes, trailing commas, collapsed conditionals) causes
        #     fusion's minijinja engine to mishandle dict types, breaking .update()
        #     calls with "map has no method named update". The issue is systemic
        #     across the deep Jinja execution chain (macros/edr/ calls into
        #     macros/utils/ extensively) and not isolatable to specific files.
        #   - integration_tests macros: python.sql contains embedded Python
        #   - dbt_packages: symlink to repo root causes infinite recursion
        exclude: |
          (?x)^(
            macros/.*|
            models/.*|
            integration_tests/.*|
            dbt_packages/.*
          )$

  - repo: local
    hooks:
      - id: no_commit
        name: Check for NO_COMMIT marker
        entry: bash -c "git diff --cached -U0 | (! grep NO_COMMIT)"
        language: system
