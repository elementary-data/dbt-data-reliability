version: "3.8"

services:
  spark-thrift:
    container_name: spark-thrift
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    ports:
      - "10000:10000"
      - "4040:4040"
    depends_on:
      spark-hive-metastore:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    command: >
      --class org.apache.spark.sql.hive.thriftserver.HiveThriftServer2
      --name Thrift JDBC/ODBC Server
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10000"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - spark-warehouse:/spark-warehouse/
      - ./docker/spark/hive-site.xml:/usr/spark/conf/hive-site.xml
      - ./docker/spark/spark-defaults.conf:/usr/spark/conf/spark-defaults.conf
    environment:
      - WAIT_FOR=spark-hive-metastore:5432

  spark-hive-metastore:
    image: postgres:15-alpine
    volumes:
      - hive-metastore:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=dbt
      - POSTGRES_PASSWORD=dbt
      - POSTGRES_DB=metastore

  minio:
    image: minio/minio:latest
    container_name: spark-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - minio-data:/data

  minio-setup:
    image: minio/mc
    container_name: spark-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/spark-seeds;
      echo 'MinIO bucket spark-seeds created.';
      "

volumes:
  spark-warehouse:
  hive-metastore:
  minio-data:
