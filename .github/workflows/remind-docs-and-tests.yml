name: Remind docs and tests
on:
  pull_request_target:
    branches: ["master"]
permissions: {}
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: wow-actions/auto-comment@2fc064c21cfb2505de3c5c10e1473b8eb7beca1a # v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          pullRequestOpened: |
            👋 @{{ author }}
            Thank you for raising your pull request.
            Please make sure to add tests and document all user-facing changes.
            You can do this by editing the `docs` files in the [`elementary`](https://github.com/elementary-data/elementary) repository.
